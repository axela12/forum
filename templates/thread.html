{% extends "base.html" %}

{% block body %}
    <h1>Thread</h1>
    <h2 id="thread-title">{{ thread_title }}</h2>

    <form id="new-post-form"></form>

    <div id="posts-container">
        <!-- Posts will be loaded here -->
    </div>

    <form id="pagination-form">
        <input type="hidden" id="thread-id" value="{{ thread_id }}">
        <label for="limit">Posts per page:</label>
        <select id="limit" name="limit">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>

        <button type="button" id="prev" disabled>Previous Page</button>
        <button type="button" id="next">Next Page</button>
    </form>
{% endblock %}

{% block scripts %}
    <script>
    let lastCreatedAt = null;
    let lastId = null;
    let stack = [];  // Keep track of previous pages for "Previous" button
    const container = document.getElementById('posts-container');

    async function getPosts(limit, lastCreatedAt = null, lastId = null) {
        try {
            let threadId = document.getElementById('thread-id').value;
            let url = `/threads/${threadId}?limit=${limit}`;
            if (lastCreatedAt && lastId) {
                url += `&last_created_at=${encodeURIComponent(lastCreatedAt)}&last_id=${lastId}`;
            }

            const res = await fetch(url, {
                method: 'GET',
                headers: {
                    "Authorization": `Bearer ${localStorage.getItem('access_token')}`
                }
            });

            if (!res.ok) {
                const data = await res.json().catch(() => null);
                throw new Error(data?.error || "Failed to fetch threads");
            }

            const threads = await res.json();
            return threads;
        } catch (err) {
            console.error(err);
            return [];
        }
    }

    function renderPosts(posts) {
        container.innerHTML = '';
        if (!posts.length) {
            container.innerHTML = '<p>No posts found.</p>';
            return;
        }

        posts.forEach(post => {
            const div = document.createElement('div');
            div.innerHTML = `<strong>${post.content}</strong> by ${post.username} <small>${post.created_at}</small>`;
            container.appendChild(div);
        });
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', async () => {
        const newPostForm = document.getElementById('new-post-form');
        if (localStorage.getItem('access_token')) {
            newPostForm.innerHTML = `
                <textarea id="post-content" placeholder="Write your post here..." required></textarea>
                <button type="submit">Create Post</button>
            `;
        } else {
            newPostForm.innerHTML = '<p>Please log in to create a post.</p>';
        }
        const limit = parseInt(document.getElementById('limit').value);
        const posts = await getPosts(limit);
        renderPosts(posts);

        if (posts.length) {
            lastCreatedAt = posts[posts.length - 1].created_at;
            lastId = posts[posts.length - 1].id;
            stack.push({lastCreatedAt, lastId});  // save for "Previous"
        }
    });

    document.getElementById('new-post-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const content = document.getElementById('post-content').value.trim();
        if (!content) return;
        create_post(document.getElementById('thread-id').value, content);
    });

    // Next button
    document.getElementById('next').addEventListener('click', async () => {
        const limit = parseInt(document.getElementById('limit').value);
        const posts = await getPosts(limit, lastCreatedAt, lastId);

        if (posts.length) {
            renderPosts(posts);
            lastCreatedAt = posts[posts.length - 1].created_at;
            lastId = posts[posts.length - 1].id;
            stack.push({lastCreatedAt, lastId});
            document.getElementById('prev').disabled = stack.length <= 1;
        }
    });

    // Previous button
    document.getElementById('prev').addEventListener('click', async () => {
        if (stack.length <= 1) return;

        stack.pop();  // remove current page
        const prev = stack[stack.length - 1];  // last page
        const limit = parseInt(document.getElementById('limit').value);

        const posts = await getPosts(limit, prev.lastCreatedAt, prev.lastId);
        renderPosts(posts);

        lastCreatedAt = posts[posts.length - 1]?.created_at || null;
        lastId = posts[posts.length - 1]?.id || null;
        document.getElementById('prev').disabled = stack.length <= 1;
    });
    </script>
{% endblock %}
