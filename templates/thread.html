{% extends "base.html" %}

{% block body %}
    <h3 id="thread-title">{{ thread_title }}</h3>

    <form id="new-post-form">
        <p>Loading new-post-form...</p>
    </form>

    <span id="notifications" class="notifications"></span>

    <div id="posts-container" class="container">
        <p>Loading posts...</p>
    </div>

    <form id="pagination-form">
        <label for="limit">Posts per page:</label>
        <select id="limit" name="limit">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>

        <button type="button" id="first" disabled>First</button>
        <button type="button" id="prev" disabled>Previous Page</button>
        <span id="page-info">Page 1</span>
        <button type="button" id="next" disabled>Next Page</button>
    </form>
{% endblock %}

{% block scripts %}
    <script>
        let thread = [];
        let limit = null;
        let stack = [];
        let pageCache = [];
        let currentPage = 0;
        const container = document.getElementById('posts-container');
        const threadId = window.location.pathname.split("/").pop();
        let newPostsCount = 0;

        function updatePageInfo() {
            document.getElementById('page-info').textContent = `Page ${currentPage + 1}`;
        }

        async function getPosts(limit, last_created_at = null, lastId = null) {
            try {
                let url = `/threads/${threadId}?limit=${limit + 1}`;
                if (last_created_at) url += `&last_created_at=${encodeURIComponent(last_created_at)}`;
                if (lastId) url += `&last_id=${encodeURIComponent(lastId)}`;

                container.innerHTML = '<p>Loading...</p>';

                const res = await fetch(url);

                if (!res.ok) {
                    const data = await res.json().catch(() => null);
                    throw new Error(data?.error || "Failed to fetch posts");
                }

                return await res.json();
            } catch (err) {
                console.error(err);
                return [];
            }
        }

        function renderPosts(thread) {
            container.innerHTML = '';
            if (!thread.length) {
                container.innerHTML = '<p>No posts found.</p>';
                return;
            }

            thread.forEach(post => {
                const div = document.createElement('div');
                div.classList.add('item');

                const header = document.createElement('div');
                header.classList.add('post-header');

                const username = document.createElement('strong');
                username.textContent = post.username;

                const created = document.createElement('small');
                created.textContent = new Date(post.created_at).toLocaleString();

                header.appendChild(username);
                header.appendChild(created);

                const content = document.createElement('p');
                content.textContent = post.content;

                div.appendChild(header);
                div.appendChild(content);

                container.appendChild(div);
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function loadFirstPage() {
            limit = parseInt(document.getElementById('limit').value);

            thread = await getPosts(limit);

            const hasMore = thread.length > limit;

            if (hasMore) {
                thread = thread.slice(0, limit);
            }

            pageCache = [thread];
            stack = [{
                last_created_at: thread.at(-1)?.created_at || null,
                lastId: thread.at(-1)?.id || null
            }];
            currentPage = 0;
            newPostsCount = 0;
            document.getElementById('notifications').textContent = '';

            renderPosts(thread);

            document.getElementById('prev').disabled = true;
            document.getElementById('first').disabled = true;
            updatePageInfo();
            document.getElementById('next').disabled = !hasMore;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const newPostForm = document.getElementById('new-post-form');

            if (localStorage.getItem('access_token')) {
                newPostForm.innerHTML = `
                    <textarea id="post-content" placeholder="Write your post here..." required></textarea><br>
                    <button type="submit">Create Post</button>
                `;

                newPostForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const content = document.getElementById('post-content');
                    if (!content.value.trim()) return;

                    await createPost(threadId, content.value.trim());
                    content.value = '';
                });

            } else {
                newPostForm.innerHTML = '<p>Please log in to create a post.</p>';
            }

            loadFirstPage();

            socket.on("error", (err) => {
                console.error("WebSocket connection error", err);
            });

            socket.on("joined_room", (data) => {
                console.log(`Joined room: ${data.room}`);
            });

            socket.on("new_post", (post) => {
                if (currentPage === 0) {
                    if (!thread.some(p => p.id === post.id)) {
                        thread.unshift(post);
                    }

                    if (thread.length > limit) {
                        thread.pop();
                    }

                    renderPosts(thread);
                } else {
                    newPostsCount++;
                    document.getElementById('notifications').textContent = `New posts: ${newPostsCount}`;
                }
            });
            
            socket.on("connect", () => {
                socket.emit("join_room", {
                    room: `thread_${threadId}`
                });
            });
        });

        document.getElementById('notifications').addEventListener('click', loadFirstPage);
        document.getElementById('limit').addEventListener('change', loadFirstPage);
        document.getElementById('first').addEventListener('click', loadFirstPage);

        document.getElementById('next').addEventListener('click', async () => {
            limit = parseInt(document.getElementById('limit').value);

            const cursor = stack[currentPage];

            thread = await getPosts(
                limit,
                cursor.last_created_at,
                cursor.lastId
            );

            const hasMore = thread.length > limit;

            if (hasMore) {
                thread = thread.slice(0, limit);
            }

            if (!thread.length) return;

            currentPage++;

            pageCache[currentPage] = thread;
            stack[currentPage] = {
                last_created_at: thread.at(-1)?.created_at || null,
                lastId: thread.at(-1)?.id || null
            };

            renderPosts(thread);

            document.getElementById('first').disabled = false;
            document.getElementById('prev').disabled = currentPage === 0;
            updatePageInfo();
            document.getElementById('next').disabled = !hasMore;
        });

        document.getElementById('prev').addEventListener('click', () => {
            if (currentPage === 0) return;

            currentPage--;

            if (currentPage === 0) {
                newPostsCount = 0;
                document.getElementById('notifications').textContent = '';
            }

            thread = pageCache[currentPage];

            renderPosts(thread);

            limit = parseInt(document.getElementById('limit').value);

            document.getElementById('first').disabled = currentPage === 0;
            document.getElementById('prev').disabled = currentPage === 0;
            updatePageInfo();
            document.getElementById('next').disabled = thread.length < limit;
        });
    </script>
{% endblock %}
