{% extends "base.html" %}

{% block body %}
    <h1>Users</h1>

    <span id="notifications" class="notifications"></span>

    <div id="users-container" class="container">
        <p>Loading users...</p>
    </div>

    <form id="user-form">
        <h3>Edit Selected User</h3>

        <label>
            <input type="radio" name="selectedUser" id="selectedUserId" hidden>
        </label>

        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password">
        
        <select id="role" required>
            <option value="">Select role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button type="button" id="edit-btn">Edit</button>
        <button type="button" id="delete-btn">Delete</button>
    </form>
    <div id="message-container"></div>

    <form id="pagination-form">
        <label for="limit">Users per page:</label>
        <select id="limit" name="limit">
            <option value="10" selected>10</option>
            <option value="20">20</option>
            <option value="50">50</option>
        </select>

        <button type="button" id="first" disabled>First</button>
        <button type="button" id="prev" disabled>Previous Page</button>
        <span id="page-info">Page 1</span>
        <button type="button" id="next" disabled>Next Page</button>
    </form>
{% endblock %}

{% block scripts %}
    <script>
        let users = [];
        let limit = null;
        let stack = [];
        let pageCache = [];
        let currentPage = 0;
        const container = document.getElementById('users-container');
        let newUsersCount = 0;

        function updatePageInfo() {
            document.getElementById('page-info').textContent = `Page ${currentPage + 1}`;
        }

        async function getUsers(limit, last_created_at = null, lastId = null) {
            try {
                let url = `/users?limit=${limit}`;
                if (last_created_at) url += `&last_created_at=${encodeURIComponent(last_created_at)}`;
                if (lastId) url += `&last_id=${encodeURIComponent(lastId)}`;

                container.innerHTML = '<p>Loading...</p>';

                const userData = JSON.parse(localStorage.getItem('userdata') || '{}');
                if (userData.role !== 'admin') {
                    throw new Error("Unauthorized: Admin access required");
                }

                if (!localStorage.getItem('access_token')) {
                    throw new Error("No access token found");
                }

                const res = await fetch(url, {
                    method: 'GET',
                    headers: {
                        "Authorization": `Bearer ${localStorage.getItem('access_token')}`
                    }
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => null);
                    throw new Error(data?.error || "Failed to fetch users");
                }

                return await res.json();
            } catch (err) {
                console.error(err);
                const errorMessage = document.createElement('p');
                errorMessage.classList.add('error-message');
                errorMessage.innerText = err?.message || "An error occurred while fetching users.";
                document.getElementById('message-container').append(errorMessage);
                return [];
            }
        }

        async function putUser() {
            const id = document.querySelector('input[name="selectedUser"]:checked')?.value;

            if (!id) {
                throw new Error('Please select a user');
                return;
            }

            const body = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const res = await fetch(`/users/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: JSON.stringify(body)
                });

                if (!res.ok) {
                    throw new Error('Failed to update user');
                }

                await loadFirstPage();
            } catch (err) {
                console.error(err);
                const errorMessage = document.createElement('p');
                errorMessage.classList.add('error-message');
                errorMessage.innerText = err.message;
                document.getElementById('message-container').append(errorMessage);
            }
        }

        async function deleteUser() {
            const id = document.querySelector('input[name="selectedUser"]:checked')?.value;

            if (!id) {
                throw new Error('Please select a user');
                return;
            }

            if (!confirm('Are you sure you want to delete this user?')) return;

            try {
                const res = await fetch(`/users/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });

                if (!res.ok) {
                    throw new Error('Failed to delete user');
                }

                await loadFirstPage();
            } catch (err) {
                console.error(err);
                const errorMessage = document.createElement('p');
                errorMessage.classList.add('error-message');
                errorMessage.innerText = err.message;
                document.getElementById('message-container').append(errorMessage);
            }
        }

        function renderUsers(users) {
            container.innerHTML = '';

            if (!users.length) {
                container.innerHTML = '<p>No users found.</p>';
                return;
            }

            users.forEach(user => {
                const label = document.createElement('label');
                label.style.display = 'block';

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'selectedUser';
                radio.value = user.id;

                radio.addEventListener('change', () => {
                    populateForm(user);
                });

                label.appendChild(radio);

                label.append(
                    ` ${user.username} (${user.email}) - ${new Date(user.created_at).toLocaleString()}`
                );

                container.appendChild(label);
            });
        }

        function populateForm(user) {
            document.getElementById('selectedUserId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('email').value = user.email;
            document.getElementById('password').value = '';
            document.getElementById('role').value = user.role || '';
        }

        async function loadFirstPage() {
            limit = parseInt(document.getElementById('limit').value);

            users = await getUsers(limit);

            pageCache = [users];
            stack = [{
                last_created_at: users.at(-1)?.created_at || null,
                lastId: users.at(-1)?.id || null
            }];
            currentPage = 0;
            newUsersCount = 0;
            document.getElementById('notifications').textContent = '';

            renderUsers(users);

            document.getElementById('prev').disabled = true;
            document.getElementById('first').disabled = true;
            updatePageInfo();
            document.getElementById('next').disabled = users.length < limit;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            loadFirstPage();

            socket.on("error", (err) => {
                console.error("WebSocket connection error", err);
            });

            socket.on("joined_room", (data) => {
                console.log(`Joined room: ${data.room}`);
            });

            socket.on("new_user", (user) => {
                if (currentPage === 0) {
                    if (!users.some(u => u.id === user.id)) {
                        users.unshift(user);
                    }

                    if (users.length > limit) {
                        users.pop();
                    }

                    renderUsers(users);
                } else {
                    newUsersCount++;
                    document.getElementById('notifications').textContent = `New users: ${newUsersCount}`;
                }
            });

            socket.on("connect", () => {
                socket.emit("join_room", {
                    room: "users"
                });
            });
        });

        document.getElementById('edit-btn').addEventListener('click', putUser);
        document.getElementById('delete-btn').addEventListener('click', deleteUser);
        document.getElementById('notifications').addEventListener('click', loadFirstPage);
        document.getElementById('limit').addEventListener('change', loadFirstPage);
        document.getElementById('first').addEventListener('click', loadFirstPage);

        document.getElementById('next').addEventListener('click', async () => {
            limit = parseInt(document.getElementById('limit').value);

            const cursor = stack[currentPage];

            users = await getUsers(
                limit,
                cursor.last_created_at,
                cursor.lastId
            );

            if (!users.length) return;

            currentPage++;

            pageCache[currentPage] = users;
            stack[currentPage] = {
                last_created_at: users.at(-1)?.created_at || null,
                lastId: users.at(-1)?.id || null
            };

            renderUsers(users);

            document.getElementById('first').disabled = false;
            document.getElementById('prev').disabled = currentPage === 0;
            updatePageInfo();
            document.getElementById('next').disabled = users.length < limit;
        });

        document.getElementById('prev').addEventListener('click', () => {
            if (currentPage === 0) return;

            currentPage--;

            if (currentPage === 0) {
                newUsersCount = 0;
                document.getElementById('notifications').textContent = '';
            }

            users = pageCache[currentPage];

            renderUsers(users);

            limit = parseInt(document.getElementById('limit').value);

            document.getElementById('first').disabled = currentPage === 0;
            document.getElementById('prev').disabled = currentPage === 0;
            updatePageInfo();
            document.getElementById('next').disabled = users.length < limit;
        });
    </script>
{% endblock %}
