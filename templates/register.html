{% extends "base.html" %}

{% block body %}
    <h1>Register an Account</h1>
    <div id="registerDiv">
        <form id="registerForm">
            <input type="text" id="username" name="username" placeholder="Username" required><br><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br><br>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required><br><br>
            <input type="email" id="email" name="email" placeholder="Email" required><br><br>
            <input type="submit" value="Register">
        </form>
    </div>
{% endblock %}

{% block scripts %}
    <script>
        document.querySelector('#registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value;
            
            try {
                await register(username, password, confirmPassword, email);
                window.location.href = '/';
            } catch (err) {
                console.error(err.message);
                if (!document.querySelector('#registerError')) {
                    const p = document.createElement('p');
                    p.id = 'registerError';
                    p.className = 'error-message';
                    p.textContent = err.message || 'An error occurred during registration';
                    document.querySelector('#registerDiv')?.appendChild(p);
                }
            }
        });
    </script>
{% endblock %}
